<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiQuest | Premium Word Guessing Game</title>
    <meta name="description" content="A visually stunning, high-performance word guessing game built with modern web technologies.">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-glow"></div>
    
    <main class="game-container">
        <header>
            <h1 class="title">LexiQuest</h1>
            <div class="category-badge">
                <span class="label">Category:</span>
                <span id="category-name" class="value">Loading...</span>
            </div>
        </header>

        <section class="game-area">
            <div class="stats">
                <div class="stat-item">
                    <span>LIVES</span>
                    <div class="progress-bar">
                        <div id="lives-progress" class="progress-fill"></div>
                    </div>
                </div>
                <div class="stat-item">
                    <span>SCORE</span>
                    <span id="score-display" class="value">0</span>
                </div>
            </div>

            <div id="word-display" class="word-display">
                <!-- Letters will be injected here -->
            </div>

            <div class="hint-container">
                <p id="hint-text" class="hint-text">
                    <span class="hint-label">HINT:</span> 
                    <span id="hint-content">Click 'Show Hint' if you're stuck!</span>
                </p>
            </div>
        </section>

        <section id="keyboard" class="keyboard">
            <!-- Keyboard buttons will be injected here -->
        </section>

        <footer class="controls">
            <button id="reset-btn" class="btn btn-secondary">New Game</button>
        </footer>
    </main>

    <!-- Win/Loss Overlay -->
    <div id="game-modal" class="modal hidden">
        <div class="modal-content glass">
            <div id="modal-icon" class="modal-icon"></div>
            <h2 id="modal-title">Game Over</h2>
            <p id="modal-msg">Better luck next time!</p>
            <div class="modal-stats">
                <p>The word was: <strong id="correct-word">CODE</strong></p>
            </div>
            <button id="play-again-btn" class="btn btn-primary">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
